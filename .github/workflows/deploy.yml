name: Deploy to Hostinger

on:
  push:
    branches: [ main ] # Change this to your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Upgraded to match composer.lock requirements
          extensions: mbstring, xml, bcmath, curl, gd
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded to latest LTS

      - name: Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: Deploy to Hostinger via SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "."
          REMOTE_HOST: 46.202.138.102
          REMOTE_USER: u598061734
          REMOTE_PORT: 65002
          TARGET: "/home/u598061734/domains/bigfunbooking.online/public_html"
          EXCLUDE: "/dist/, /node_modules/, /.git/, /.github/, .env, /storage/app/*, /storage/framework/sessions/*, /storage/logs/*"

      - name: Post-Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 46.202.138.102
          port: 65002
          username: u598061734
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd /home/u598061734/domains/bigfunbooking.online/public_html
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
